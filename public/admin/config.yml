backend:
  name: github
  repo: shalusharma/rk5-shopping-bar
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "site_content"
    label: "Site Content"
    files:
      - label: "Hero Section"
        name: "hero"
        file: "src/content/sections/hero.json"
        fields:
          - { label: "Headline", name: "headline", widget: "string" }
          - { label: "Subtext", name: "subtext", widget: "text" }
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Hero Image", name: "image", widget: "image" }
      
      - label: "Contact Info"
        name: "contact"
        file: "src/content/sections/contact.json"
        fields:
          - { label: "Phone Number", name: "phone", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Instagram Link", name: "instagram", widget: "string" }
          - { label: "Facebook Link", name: "facebook", widget: "string" }
          - { label: "WhatsApp Channel Link", name: "whatsapp_channel", widget: "string" }

  - name: "collections_list"
    label: "Fashion Collections"
    folder: "src/content/collections"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Icon Name (Lucide)", name: "icon", widget: "string", default: "shirt" }
